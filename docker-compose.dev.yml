services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: 8790
      HUMAN_AGENT_PLAYGROUND_DATA_PATH: /data/sessions.json
      HUMAN_AGENT_PLAYGROUND_AUTH_DATA_PATH: /data/restflow.db
    ports:
      - "${DEV_HOST_API_PORT:-8793}:8790"
    volumes:
      - human-agent-playground-dev-data:/data
    develop:
      watch:
        - action: rebuild
          path: ./Cargo.toml
        - action: rebuild
          path: ./Cargo.lock
        - action: rebuild
          path: ./apps/backend
        - action: rebuild
          path: ./crates

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:${DEV_HOST_API_PORT:-8793}}"
        VITE_API_PORT: "${VITE_API_PORT:-8793}"
    depends_on:
      - backend
    ports:
      - "${DEV_HOST_WEB_PORT:-4181}:4178"
    develop:
      watch:
        - action: rebuild
          path: ./apps/web
        - action: rebuild
          path: ./packages/core
        - action: rebuild
          path: ./games/xiangqi
        - action: rebuild
          path: ./games/gomoku
        - action: rebuild
          path: ./games/connect-four
        - action: rebuild
          path: ./games/othello
        - action: rebuild
          path: ./games/chess
        - action: rebuild
          path: ./Dockerfile.web

volumes:
  human-agent-playground-dev-data:
