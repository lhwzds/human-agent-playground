services:
  ai-bridge:
    build:
      context: .
      dockerfile: Dockerfile.ai-bridge
    environment:
      PORT: 8795
      HUMAN_AGENT_PLAYGROUND_AI_BRIDGE_DATA_PATH: /data/restflow.db
    ports:
      - "${HOST_AI_BRIDGE_PORT:-8795}:8795"
    volumes:
      - human-agent-playground-bridge-data:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    depends_on:
      - ai-bridge
    environment:
      PORT: 8790
      HUMAN_AGENT_PLAYGROUND_DATA_PATH: /data/sessions.json
      HUMAN_AGENT_PLAYGROUND_AI_BRIDGE_URL: http://ai-bridge:8795
    ports:
      - "${HOST_API_PORT:-8790}:8790"
    volumes:
      - human-agent-playground-data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: "${VITE_API_URL:-http://localhost:8790}"
    depends_on:
      - server
    ports:
      - "${HOST_WEB_PORT:-4178}:4178"

volumes:
  human-agent-playground-data:
  human-agent-playground-bridge-data:
