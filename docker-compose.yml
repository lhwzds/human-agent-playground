services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    environment:
      PORT: 8790
      HUMAN_AGENT_PLAYGROUND_DATA_PATH: /data/sessions.json
      HUMAN_AGENT_PLAYGROUND_AUTH_DATA_PATH: /data/restflow.db
    ports:
      - "${HOST_API_PORT:-8790}:8790"
    volumes:
      - human-agent-playground-data:/data

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        VITE_API_URL: "${VITE_API_URL:-}"
        VITE_API_PORT: "${VITE_API_PORT:-8790}"
    depends_on:
      - backend
    ports:
      - "${HOST_WEB_PORT:-4178}:4178"

volumes:
  human-agent-playground-data:
